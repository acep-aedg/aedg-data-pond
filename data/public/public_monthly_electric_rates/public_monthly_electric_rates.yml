resource:
  name: public_monthly_electric_rates
  title: Monthly Electricity Rates for Communities
  summary: |
    This dataset is electric rates by communities as they are recorded by reporting entities (i.e. utilities).
  description: |
    This dataset is electric rates by communities as they are recorded by reporting entities (i.e. utilities). There is no single state or federal agency that collects data on all utility sales in Alaska.
    This dataset derives from the Alaska Energy Statistics workbooks, which in turn compiles data from multiple sources including community Power Cost Equalization reports collated by the Alaska Energy Authority and reporting to the U.S. Energy Information Administration (EIA). Source data was harmonized to account for differences in reporting through a combination of subject matter expertise and transformations.
    The same values for electric rates are reported for all the communities served by the reporting entity, which creates multiple duplicate values in this dataset.
  path: "https://raw.githubusercontent.com/acep-aedg/aedg-data-pond/refs/heads/main/data/public/public_monthly_electric_rates/public_monthly_electric_rates.csv"
  keywords:
    - sales
    - electricity
    - report
    - Power Cost Equalization (PCE)
    - EIA Form 923
    - community
  topics:
    - Energy
  publisher: acep
  sources:
    - dcra.communities
    - dol.places
    - acep.es_monthly_sales
  licenses:
    - CC-BY-4.0
  spatial:
    name: Alaska
    boundingBox: [-187.55, 51.21, -130.0, 71.35]
    crs: OGC:CRS84
  temporal:
    referenceDate: "2024-02-29"  # equivalent to as_of_date
    timeseries:
      - start: "2001-01-01"
        end: "2021-12-31"
        resolutionValue: null
        resolutionUnit: month
        aggregationType: average
        alignment: null
  primaryKey: # An array of fields that uniquely identifies each row in the table
    - fips_code  # this will change to reporting entity when that column gets added
    - year
  contributors: # roles from https://datacite-metadata-schema.readthedocs.io/en/4.5/properties/contributor/#a-contributortype
    - title: Neil McMahon
      organization: acep
      roles:
        - DataCollector
      date: 2024
      object: data from the Alaska Energy Statistics Financial Tables
      comment: |
        Pulled data from the original sources, the compiled, corrected, harmonized, transformed data into Excel Workbooks as annual datasets and as Financial and Generation timeseries. Additional corrections were applied to the yearly data.
    - organization: acep
      roles:
        - DataCurator
      date: 2025
      object: data via https://github.com/acep-aedg/aedg-etl-2024
      comment: |
        1. Contracted Neil McMahon to produce the Workbooks, and then posted them in GitHub for distribution.
        2. Complied community names, locations, and FIPS identifiers for AEDG
        3. Residential rates are pre-calculated as residential_rate for all reporting entities and post-subsidy residential_rate_subsidized for PCE reporting entities
        4. Data for non-residential sectors was reported only as sales and revenue. For these categories, rates were calculated by dividing revenue/sales_mwh.
        5. Joined rate data with AEDG communities to create this dataset
